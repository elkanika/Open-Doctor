es:
  # Formatos de fecha y hora argentinos
  date:
    formats:
      default: "%d/%m/%Y"
      short: "%d/%m"
      long: "%d de %B de %Y"
    day_names:
      - Domingo
      - Lunes
      - Martes
      - Miércoles
      - Jueves
      - Viernes
      - Sábado
    abbr_day_names:
      - Dom
      - Lun
      - Mar
      - Mié
      - Jue
      - Vie
      - Sáb
    month_names:
      - ~
      - Enero
      - Febrero
      - Marzo
      - Abril
      - Mayo
      - Junio
      - Julio
      - Agosto
      - Septiembre
      - Octubre
      - Noviembre
      - Diciembre
    abbr_month_names:
      - ~
      - Ene
      - Feb
      - Mar
      - Abr
      - May
      - Jun
      - Jul
      - Ago
      - Sep
      - Oct
      - Nov
      - Dic
    order:
      - :day
      - :month
      - :year

  time:
    formats:
      default: "%d/%m/%Y %H:%M"
      short: "%d/%m %H:%M"
      long: "%d de %B de %Y %H:%M"

  # ActiveRecord
  activerecord:
    errors:
      messages:
        record_invalid: "La validación falló: %{errors}"
        restrict_dependent_destroy:
          has_one: "No se puede eliminar porque tiene un %{record} dependiente"
          has_many: "No se puede eliminar porque tiene %{record} dependientes"
      template:
        body: "Se encontraron los siguientes problemas:"
        header:
          one: "%{model} no se pudo guardar porque se encontró 1 error"
          other: "%{model} no se pudo guardar porque se encontraron %{count} errores"
    models:
      studio: Estudio
      user: Usuario
      client: Cliente
      expediente: Expediente
      procedural_instance: Instancia Procesal
      procedural_act: Acto Procesal
      deadline: Plazo
      movement: Movimiento
    attributes:
      studio:
        name: Nombre
        slug: Identificador
        cuit: CUIT
        email: Email
        phone: Teléfono
        address: Dirección
        timezone: Zona horaria
        plan: Plan
      user:
        email: Email
        password: Contraseña
        password_confirmation: Confirmación de contraseña
        first_name: Nombre
        last_name: Apellido
        role: Rol
        phone: Teléfono
        matricula: Matrícula
      client:
        first_name: Nombre
        last_name: Apellido
        document_type: Tipo de documento
        document_number: Número de documento
        email: Email
        phone: Teléfono
        address: Domicilio
        notes: Notas
      expediente:
        caratula: Carátula
        numero_causa: "Nº de causa"
        juzgado: Juzgado
        fuero: Fuero
        jurisdiccion: Jurisdicción
        status: Estado
        tipo_proceso: Tipo de proceso
        materia: Materia
        parte: Parte
        monto_reclamado: Monto reclamado
        moneda: Moneda
        fecha_inicio: Fecha de inicio
        descripcion: Descripción
      deadline:
        title: Título
        description: Descripción
        party: Parte
        starts_on: Fecha de inicio
        due_on: Fecha de vencimiento
        completed_on: Fecha de cumplimiento
        days_count: Días del plazo
        business_days: Días hábiles
        status: Estado
        alert_days_before: Días de anticipación
        depends_on_event: Depende del evento
        priority: Prioridad

  # Errores genéricos
  errors:
    messages:
      accepted: debe ser aceptado
      blank: no puede estar en blanco
      confirmation: no coincide
      empty: no puede estar vacío
      equal_to: debe ser igual a %{count}
      even: debe ser un número par
      exclusion: está reservado
      greater_than: debe ser mayor que %{count}
      greater_than_or_equal_to: debe ser mayor o igual que %{count}
      in: debe estar en %{count}
      inclusion: no está incluido en la lista
      invalid: no es válido
      less_than: debe ser menor que %{count}
      less_than_or_equal_to: debe ser menor o igual que %{count}
      model_invalid: "La validación falló: %{errors}"
      not_a_number: no es un número
      not_an_integer: debe ser un número entero
      odd: debe ser un número impar
      other_than: debe ser distinto de %{count}
      present: debe estar en blanco
      required: obligatorio
      taken: ya está en uso
      too_long:
        one: es demasiado largo (máximo 1 carácter)
        other: es demasiado largo (máximo %{count} caracteres)
      too_short:
        one: es demasiado corto (mínimo 1 carácter)
        other: es demasiado corto (mínimo %{count} caracteres)
      wrong_length:
        one: longitud errónea (debe ser de 1 carácter)
        other: longitud errónea (debe ser de %{count} caracteres)

  # Helpers
  helpers:
    select:
      prompt: Seleccionar...
    submit:
      create: Crear %{model}
      update: Actualizar %{model}
      submit: Guardar %{model}

  # Términos jurídicos del dominio
  enums:
    expediente:
      status:
        activo: Activo
        en_tramite: En trámite
        paralizado: Paralizado
        archivado: Archivado
        finalizado: Finalizado
      fuero:
        civil: Civil
        penal: Penal
        laboral: Laboral
        comercial: Comercial
        contencioso_administrativo: Contencioso Administrativo
        familia: Familia
      jurisdiccion:
        nacional: Nacional
        provincial: Provincial
        federal: Federal
      parte:
        actor: Actor
        demandado: Demandado
    deadline:
      status:
        pendiente: Pendiente
        cumplido: Cumplido
        vencido: Vencido
        suspendido: Suspendido
      party:
        propio: Propio
        contraria: Contraria
      priority:
        normal: Normal
        alta: Alta
        urgente: Urgente
    user:
      role:
        titular: Titular
        colaborador: Colaborador
        administrativo: Administrativo
