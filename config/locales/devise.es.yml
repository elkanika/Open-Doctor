    confirmations:
      confirmed: Tu cuenta fue confirmada.
      send_instructions: Vas a recibir un email con instrucciones sobre cómo confirmar tu cuenta.
      send_paranoid_instructions: Si tu email existe en nuestra base de datos, vas a recibir un email con instrucciones sobre cómo confirmar tu cuenta.
    failure:
