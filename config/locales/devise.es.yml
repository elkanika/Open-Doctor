      signed_up_but_locked: Tu cuenta fue creada, pero no podés iniciar sesión porque está bloqueada.
      signed_up_but_unconfirmed: Un mensaje con un enlace de confirmación fue enviado a tu email. Confirmá tu cuenta para continuar.
      update_needs_confirmation: Actualizaste tu cuenta, pero necesitamos verificar tu nuevo email. Revisá tu casilla y confirmá tu nuevo email.
      updated: Tu cuenta fue actualizada.
      updated_but_not_signed_in: Tu cuenta fue actualizada, pero como tu contraseña cambió, necesitás iniciar sesión nuevamente.
