      reset_password_instructions:
        subject: Instrucciones para restablecer tu contraseña
      unlock_instructions:
        subject: Instrucciones para desbloquear tu cuenta
      email_changed:
        subject: Email cambiado
      password_change:
        subject: Contraseña cambiada
